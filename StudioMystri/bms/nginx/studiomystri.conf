# HTTP -> redirect to HTTPS (Certbot will modify this)
server {
    listen 80;
    server_name bms.studiomystri.com www.bms.studiomystri.com;
    return 301 https://$host$request_uri;
}
# HTTPS
server {
    listen 443 ssl http2;
    server_name bms.studiomystri.com www.bms.studiomystri.com;
    # SSL - managed by Certbot
    ssl_certificate /etc/letsencrypt/live/bms.studiomystri.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bms.studiomystri.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    # Frontend - serve Vite build as SPA
    root /var/www/studiomystri/frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    # Backend API - reverse proxy to Node/Express
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
        client_max_body_size 20M;
    }
    # Dedicated Socket.io traffic
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    # File uploads - serve directly from disk
    location /uploads/ {
        alias /var/www/studiomystri/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
    # Block .env and sensitive files
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
