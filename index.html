<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Mystri BMS</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#38e07b",
              "background-light": "#f6f8f7",
              "background-dark": "#122017",
              "surface-dark": "#1a261e",
              "surface-darker": "#111714",
              "surface-highlight": "#23332c",
              "bronze": "#cd7f32",
              "bronze-light": "#e6be8a",
              "bronze-dark": "#a05a2c",
              "text-muted": "#9eb7a8",
              "border-dark": "#29382f"
            },
            fontFamily: {
              "display": ["Public Sans", "sans-serif"],
              "mono": ["Space Mono", "monospace"]
            },
            borderRadius: {
              "DEFAULT": "1rem", 
              "lg": "1.5rem", 
              "xl": "2rem", 
              "2xl": "2.5rem",
              "full": "9999px"
            },
            boxShadow: {
                "glow": "0 0 15px rgba(56, 224, 123, 0.15)",
                "glow-hover": "0 0 25px rgba(56, 224, 123, 0.3)"
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Public Sans', sans-serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #122017;
      }
      ::-webkit-scrollbar-thumb {
        background: #29382f;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #38e07b;
      }
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      .glass-panel {
          background: rgba(30, 30, 30, 0.65);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border-left: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/": "https://esm.sh/react@18.2.0/",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/": "https://esm.sh/react-dom@18.2.0/",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
        "recharts": "https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0",
        "@google/genai": "https://esm.sh/@google/genai@0.1.1"
      }
    }
    </script>
  </head>
  <body class="bg-background-dark text-white antialiased overflow-hidden">
    <div id="root"></div>
  </body>
</html>
